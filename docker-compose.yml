services:
  ros:
    build:
      dockerfile: devcontainer.dockerfile
      context: .
    stdin_open: true
    tty: true
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/home/developer/ros_ws/src/
      - /dev/input/:/dev/input/
    environment:
      - DISPLAY=${DISPLAY}
    devices:
      - /dev/dri:/dev/dri
    privileged: true
